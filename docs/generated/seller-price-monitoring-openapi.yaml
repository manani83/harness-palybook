openapi: 3.1.0
info:
  title: Seller Price Monitoring API
  version: 0.1.0
  description: >
    Draft OpenAPI specification for the seller price monitoring service.
    This file mirrors the human-readable API design docs and keeps request/response
    shapes aligned with the schema and wireframes.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Organizations
  - name: Dashboard
  - name: MonitoredProducts
  - name: CompetitorProducts
  - name: Events
  - name: AlertRules
  - name: Notifications
  - name: Reports
security:
  - bearerAuth: []
x-error-response-sets:
  read: &ReadErrorResponses
    '400':
      $ref: '#/components/responses/BadRequestError'
    '401':
      $ref: '#/components/responses/UnauthorizedError'
    '403':
      $ref: '#/components/responses/ForbiddenError'
    '404':
      $ref: '#/components/responses/NotFoundError'
    '429':
      $ref: '#/components/responses/RateLimitedError'
    '503':
      $ref: '#/components/responses/UpstreamUnavailableError'
  write: &WriteErrorResponses
    '400':
      $ref: '#/components/responses/BadRequestError'
    '401':
      $ref: '#/components/responses/UnauthorizedError'
    '403':
      $ref: '#/components/responses/ForbiddenError'
    '404':
      $ref: '#/components/responses/NotFoundError'
    '409':
      $ref: '#/components/responses/ConflictError'
    '429':
      $ref: '#/components/responses/RateLimitedError'
    '503':
      $ref: '#/components/responses/UpstreamUnavailableError'
  auth: &AuthErrorResponses
    '400':
      $ref: '#/components/responses/BadRequestError'
    '401':
      $ref: '#/components/responses/UnauthorizedError'
    '403':
      $ref: '#/components/responses/ForbiddenError'
    '429':
      $ref: '#/components/responses/RateLimitedError'
    '503':
      $ref: '#/components/responses/UpstreamUnavailableError'
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |-
        401: email or password is invalid.
        403: account is suspended or login is blocked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        <<: *AuthErrorResponses
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      description: |-
        401: refresh token is missing, expired, or invalid.
        403: the session has been revoked.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        <<: *AuthErrorResponses
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session
      description: |-
        401: access token is missing or expired.
        403: the current session is already revoked.
      responses:
        <<: *AuthErrorResponses
        '204':
          description: Logged out
  /me:
    get:
      tags: [Auth]
      summary: Current user and accessible organizations
      description: |-
        401: access token is missing or expired.
        403: the account is suspended or permissions were revoked.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /organizations:
    get:
      tags: [Organizations]
      summary: List accessible organizations
      description: |-
        401: access token is missing or expired.
        403: workspace access is not granted.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
    post:
      tags: [Organizations]
      summary: Create an organization
      description: |-
        401: access token is missing or expired.
        403: workspace creation is restricted for this account.
        409: organization name or slug already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        <<: *WriteErrorResponses
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
  /organizations/{organizationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Organizations]
      summary: Get organization details
      description: |-
        401: access token is missing or expired.
        403: caller is not a member of the organization.
        404: organization not found.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
    patch:
      tags: [Organizations]
      summary: Update organization settings
      description: |-
        401: access token is missing or expired.
        403: admin permission is required.
        404: organization not found.
        409: name or status change conflicts with the current state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
  /organizations/{organizationId}/members:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Organizations]
      summary: List organization members
      description: |-
        401: access token is missing or expired.
        403: member list access is denied.
        404: organization not found.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Member list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMemberListResponse'
  /organizations/{organizationId}/invites:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Organizations]
      summary: Invite a new member
      description: |-
        401: access token is missing or expired.
        403: invite sending permission is required.
        404: organization not found.
        409: the target email is already invited or already a member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInviteCreateRequest'
      responses:
        <<: *WriteErrorResponses
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInviteResponse'
  /invites/{token}/accept:
    post:
      tags: [Organizations]
      summary: Accept an invitation
      description: |-
        401: access token is missing or expired.
        403: the invite email does not match the current account.
        404: invite token is missing, expired, or invalid.
        409: the invite was already accepted or the user is already a member.
      parameters:
        - $ref: '#/components/parameters/InviteToken'
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Invite accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInviteAcceptResponse'
  /organizations/{organizationId}/members/{memberId}:
    delete:
      tags: [Organizations]
      summary: Remove a member from an organization
      description: |-
        401: access token is missing or expired.
        403: member removal permission is required.
        404: organization or member not found.
        409: the last admin cannot be removed or the member is already locked.
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/MemberId'
      responses:
        <<: *WriteErrorResponses
        '204':
          description: Member removed
  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get dashboard summary
      description: |-
        401: access token is missing or expired.
        403: organization access is denied.
        404: organization not found.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdQuery'
        - $ref: '#/components/parameters/Range'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummaryResponse'
  /monitored-products:
    get:
      tags: [MonitoredProducts]
      summary: List monitored products
      description: |-
        401: access token is missing or expired.
        403: product list access is denied.
        404: organization not found.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdQuery'
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Monitored product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoredProductListResponse'
    post:
      tags: [MonitoredProducts]
      summary: Create a monitored product
      description: |-
        401: access token is missing or expired.
        403: product creation permission is required.
        404: organization not found.
        409: the owner product or URL is already tracked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoredProductCreateRequest'
      responses:
        <<: *WriteErrorResponses
        '201':
          description: Monitored product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoredProductResponse'
  /monitored-products/{monitoredProductId}:
    parameters:
      - $ref: '#/components/parameters/MonitoredProductId'
    get:
      tags: [MonitoredProducts]
      summary: Get monitored product details
      description: |-
        401: access token is missing or expired.
        403: caller cannot view this monitored product.
        404: monitored product not found.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Monitored product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoredProductResponse'
    patch:
      tags: [MonitoredProducts]
      summary: Update a monitored product
      description: |-
        401: access token is missing or expired.
        403: product update permission is required.
        404: monitored product not found.
        409: the product is archived or the state change conflicts with current tracking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoredProductUpdateRequest'
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Monitored product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoredProductResponse'
    delete:
      tags: [MonitoredProducts]
      summary: Disable a monitored product
      description: |-
        401: access token is missing or expired.
        403: product deletion permission is required.
        404: monitored product not found.
        409: active competitor products prevent deletion.
      responses:
        <<: *WriteErrorResponses
        '204':
          description: Monitored product archived
  /monitored-products/{monitoredProductId}/competitor-products:
    parameters:
      - $ref: '#/components/parameters/MonitoredProductId'
    get:
      tags: [CompetitorProducts]
      summary: List competitor products for a monitored product
      description: |-
        401: access token is missing or expired.
        403: competitor list access is denied.
        404: monitored product not found.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Competitor product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorProductListResponse'
    post:
      tags: [CompetitorProducts]
      summary: Register a competitor product
      description: |-
        401: access token is missing or expired.
        403: competitor product registration permission is required.
        404: monitored product not found.
        409: the competitor product URL is already tracked for this product.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorProductCreateRequest'
      responses:
        <<: *WriteErrorResponses
        '201':
          description: Competitor product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorProductResponse'
  /competitor-products/{competitorProductId}:
    parameters:
      - $ref: '#/components/parameters/CompetitorProductId'
    patch:
      tags: [CompetitorProducts]
      summary: Update a competitor product
      description: |-
        401: access token is missing or expired.
        403: competitor product update permission is required.
        404: competitor product not found.
        409: the competitor is already inactive or the requested state conflicts with current tracking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorProductUpdateRequest'
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Competitor product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorProductResponse'
    delete:
      tags: [CompetitorProducts]
      summary: Stop tracking a competitor product
      description: |-
        401: access token is missing or expired.
        403: competitor product deletion permission is required.
        404: competitor product not found.
        409: the competitor is already removed or snapshots prevent deletion.
      responses:
        <<: *WriteErrorResponses
        '204':
          description: Competitor product removed
  /competitor-products/{competitorProductId}/snapshots:
    get:
      tags: [CompetitorProducts]
      summary: List snapshots for a competitor product
      description: |-
        401: access token is missing or expired.
        403: snapshot access is denied.
        404: competitor product not found.
      parameters:
        - $ref: '#/components/parameters/CompetitorProductId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/From'
        - $ref: '#/components/parameters/To'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Snapshot list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSnapshotListResponse'
  /events:
    get:
      tags: [Events]
      summary: List events
      description: |-
        401: access token is missing or expired.
        403: event access is denied.
        404: organization not found.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdQuery'
        - $ref: '#/components/parameters/EventTypeQuery'
        - $ref: '#/components/parameters/IsReadQuery'
        - $ref: '#/components/parameters/IsPinnedQuery'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
  /events/{eventId}:
    parameters:
      - $ref: '#/components/parameters/EventId'
    get:
      tags: [Events]
      summary: Get event details
      description: |-
        401: access token is missing or expired.
        403: event access is denied.
        404: event not found.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
    patch:
      tags: [Events]
      summary: Update event state
      description: |-
        401: access token is missing or expired.
        403: event update permission is required.
        404: event not found.
        409: the event is already resolved or the state transition conflicts with current status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdateRequest'
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
  /alert-rules:
    get:
      tags: [AlertRules]
      summary: List alert rules
      description: |-
        401: access token is missing or expired.
        403: alert rule access is denied.
        404: organization not found.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdQuery'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Alert rule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRuleListResponse'
    post:
      tags: [AlertRules]
      summary: Create an alert rule
      description: |-
        401: access token is missing or expired.
        403: alert rule creation permission is required.
        404: organization not found.
        409: a duplicate or conflicting rule already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleCreateRequest'
      responses:
        <<: *WriteErrorResponses
        '201':
          description: Alert rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRuleResponse'
  /alert-rules/{alertRuleId}:
    parameters:
      - $ref: '#/components/parameters/AlertRuleId'
    patch:
      tags: [AlertRules]
      summary: Update an alert rule
      description: |-
        401: access token is missing or expired.
        403: alert rule update permission is required.
        404: alert rule not found.
        409: another rule already uses the same condition set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleUpdateRequest'
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Alert rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRuleResponse'
    delete:
      tags: [AlertRules]
      summary: Disable an alert rule
      description: |-
        401: access token is missing or expired.
        403: alert rule deletion permission is required.
        404: alert rule not found.
        409: the rule is already disabled or protected from deletion.
      responses:
        <<: *WriteErrorResponses
        '204':
          description: Alert rule deleted
  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: |-
        401: access token is missing or expired.
        403: notification access is denied.
        404: organization not found.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdQuery'
        - $ref: '#/components/parameters/NotificationStatusQuery'
        - $ref: '#/components/parameters/DeliveryChannelQuery'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
  /notifications/{notificationId}:
    parameters:
      - $ref: '#/components/parameters/NotificationId'
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      description: |-
        401: access token is missing or expired.
        403: notification update permission is required.
        404: notification not found.
        409: the notification is already in a final state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                readAt:
                  type: string
                  format: date-time
      responses:
        <<: *WriteErrorResponses
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
  /reports:
    get:
      tags: [Reports]
      summary: List reports
      description: |-
        401: access token is missing or expired.
        403: report access is denied.
        404: organization not found.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdQuery'
        - $ref: '#/components/parameters/ReportTypeQuery'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Report list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
  /reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      summary: Get a report
      description: |-
        401: access token is missing or expired.
        403: report access is denied.
        404: report not found.
      responses:
        <<: *ReadErrorResponses
        '200':
          description: Report details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string
    MonitoredProductId:
      name: monitoredProductId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CompetitorProductId:
      name: competitorProductId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AlertRuleId:
      name: alertRuleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationIdQuery:
      name: organizationId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    Range:
      name: range
      in: query
      required: false
      schema:
        type: string
        enum: [24h, 7d, 30d]
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [active, paused, archived]
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    From:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    EventTypeQuery:
      name: eventType
      in: query
      required: false
      schema:
        type: string
        enum:
          - price_drop
          - price_rise
          - lowest_price_changed
          - margin_risk
          - out_of_stock
          - restock
          - review_spike
          - rating_alert
    IsReadQuery:
      name: isRead
      in: query
      required: false
      schema:
        type: boolean
    IsPinnedQuery:
      name: isPinned
      in: query
      required: false
      schema:
        type: boolean
    NotificationStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [queued, sent, delivered, failed]
    DeliveryChannelQuery:
      name: channel
      in: query
      required: false
      schema:
        type: string
        enum: [email, slack, kakaowork, webhook]
    ReportTypeQuery:
      name: reportType
      in: query
      required: false
      schema:
        type: string
        enum: [daily_summary, weekly_summary, client_report]
  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequestError:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitedError:
      description: Rate Limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UpstreamUnavailableError:
      description: Upstream Unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ResponseMeta:
      type: object
      required: [requestId, nextCursor, hasMore]
      properties:
        requestId:
          type: string
        nextCursor:
          type: [string, 'null']
        hasMore:

spring:
  application:
    name: seller-price-monitoring
  profiles:
    active: local
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  error:
    include-message: never

app:
  jwt:
    issuer: seller-price-monitoring
    secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    access-token-ttl: PT15M
    refresh-token-ttl: P14D
  web:
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:5173
      allow-credentials: true

logging:
  level:
    kr.co.harness.spm: debug
